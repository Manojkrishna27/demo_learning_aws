<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A sleek, production-ready responsive calculator with scientific mode, history, and keyboard support."
    />
    <meta name="theme-color" content="#0f0f1a" />
    <title>CalcPro – Smart Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background orbs -->
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-orb orb-3" aria-hidden="true"></div>

    <main class="app-wrapper" role="main">
      <div class="calculator" id="calculator" role="application" aria-label="Calculator">

        <!-- Header -->
        <header class="calc-header">
          <div class="calc-brand">
            <span class="brand-icon" aria-hidden="true">⬡</span>
            <span class="brand-name">CalcPro</span>
          </div>
          <div class="header-actions">
            <button
              class="icon-btn"
              id="historyToggleBtn"
              aria-label="Toggle history panel"
              title="History"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 .49-4.5"></path>
              </svg>
            </button>
            <button
              class="icon-btn mode-toggle"
              id="modeToggleBtn"
              aria-label="Switch to scientific mode"
              title="Scientific Mode"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="4" y1="21" x2="4" y2="14"></line>
                <line x1="4" y1="10" x2="4" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12" y2="3"></line>
                <line x1="20" y1="21" x2="20" y2="16"></line>
                <line x1="20" y1="12" x2="20" y2="3"></line>
                <line x1="1" y1="14" x2="7" y2="14"></line>
                <line x1="9" y1="8" x2="15" y2="8"></line>
                <line x1="17" y1="16" x2="23" y2="16"></line>
              </svg>
            </button>
          </div>
        </header>

        <!-- History Panel -->
        <aside class="history-panel" id="historyPanel" aria-label="Calculation history" aria-hidden="true">
          <div class="history-header">
            <h2 class="history-title">History</h2>
            <button class="clear-history-btn" id="clearHistoryBtn" aria-label="Clear all history">
              Clear All
            </button>
          </div>
          <ul class="history-list" id="historyList" role="list" aria-label="Past calculations">
            <li class="history-empty" id="historyEmpty">No calculations yet</li>
          </ul>
        </aside>

        <!-- Display -->
        <section class="display-section" aria-label="Calculator display">
          <div class="display-container">
            <div class="expression-row" id="expressionDisplay" aria-live="polite" aria-label="Expression">
              &nbsp;
            </div>
            <div class="result-row">
              <output
                class="main-display"
                id="mainDisplay"
                aria-live="assertive"
                aria-label="Result"
              >0</output>
              <span class="angle-unit" id="angleUnit" aria-label="Angle unit">DEG</span>
            </div>
          </div>
          <div class="display-meta">
            <span class="memory-indicator" id="memoryIndicator" aria-live="polite"></span>
            <span class="error-indicator" id="errorIndicator" role="alert"></span>
          </div>
        </section>

        <!-- Scientific Buttons (hidden by default) -->
        <section class="scientific-panel" id="scientificPanel" aria-label="Scientific functions" aria-hidden="true">
          <div class="sci-grid">
            <button class="btn sci-btn" data-action="toggleAngle" id="btnAngle" aria-label="Toggle angle unit DEG RAD">DEG</button>
            <button class="btn sci-btn" data-action="sin"   aria-label="Sine">sin</button>
            <button class="btn sci-btn" data-action="cos"   aria-label="Cosine">cos</button>
            <button class="btn sci-btn" data-action="tan"   aria-label="Tangent">tan</button>
            <button class="btn sci-btn" data-action="log"   aria-label="Logarithm base 10">log</button>
            <button class="btn sci-btn" data-action="ln"    aria-label="Natural logarithm">ln</button>
            <button class="btn sci-btn" data-action="sqrt"  aria-label="Square root">√</button>
            <button class="btn sci-btn" data-action="pow2"  aria-label="Square">x²</button>
            <button class="btn sci-btn" data-action="pow3"  aria-label="Cube">x³</button>
            <button class="btn sci-btn" data-action="powN"  aria-label="Power">xʸ</button>
            <button class="btn sci-btn" data-action="inv"   aria-label="Inverse">1/x</button>
            <button class="btn sci-btn" data-action="pi"    aria-label="Pi constant">π</button>
            <button class="btn sci-btn" data-action="e"     aria-label="Euler number">e</button>
            <button class="btn sci-btn" data-action="fact"  aria-label="Factorial">n!</button>
            <button class="btn sci-btn" data-action="abs"   aria-label="Absolute value">|x|</button>
            <button class="btn sci-btn" data-action="exp"   aria-label="Scientific notation">EXP</button>
            <button class="btn sci-btn" data-action="memStore"  aria-label="Store in memory">MS</button>
            <button class="btn sci-btn" data-action="memRecall" aria-label="Recall from memory">MR</button>
            <button class="btn sci-btn" data-action="memAdd"    aria-label="Add to memory">M+</button>
            <button class="btn sci-btn" data-action="memClear"  aria-label="Clear memory">MC</button>
          </div>
        </section>

        <!-- Standard Keypad -->
        <section class="keypad" aria-label="Calculator keypad">
          <div class="btn-grid">
            <!-- Row 1 -->
            <button class="btn btn-fn" data-action="clear"      id="btnClear"   aria-label="All clear">AC</button>
            <button class="btn btn-fn" data-action="toggleSign" id="btnSign"    aria-label="Toggle sign">+/−</button>
            <button class="btn btn-fn" data-action="percent"    id="btnPercent" aria-label="Percent">%</button>
            <button class="btn btn-op" data-action="divide"     id="btnDivide"  aria-label="Divide">÷</button>

            <!-- Row 2 -->
            <button class="btn btn-num" data-value="7" aria-label="Seven">7</button>
            <button class="btn btn-num" data-value="8" aria-label="Eight">8</button>
            <button class="btn btn-num" data-value="9" aria-label="Nine">9</button>
            <button class="btn btn-op"  data-action="multiply" id="btnMultiply" aria-label="Multiply">×</button>

            <!-- Row 3 -->
            <button class="btn btn-num" data-value="4" aria-label="Four">4</button>
            <button class="btn btn-num" data-value="5" aria-label="Five">5</button>
            <button class="btn btn-num" data-value="6" aria-label="Six">6</button>
            <button class="btn btn-op"  data-action="subtract" id="btnSubtract" aria-label="Subtract">−</button>

            <!-- Row 4 -->
            <button class="btn btn-num" data-value="1" aria-label="One">1</button>
            <button class="btn btn-num" data-value="2" aria-label="Two">2</button>
            <button class="btn btn-num" data-value="3" aria-label="Three">3</button>
            <button class="btn btn-op"  data-action="add" id="btnAdd" aria-label="Add">+</button>

            <!-- Row 5 -->
            <button class="btn btn-num btn-zero" data-value="0" aria-label="Zero">0</button>
            <button class="btn btn-num" data-action="decimal" id="btnDecimal" aria-label="Decimal point">.</button>
            <button class="btn btn-eq"  data-action="equals" id="btnEquals" aria-label="Equals">=</button>

            <!-- Backspace -->
            <button class="btn btn-fn btn-back" data-action="backspace" id="btnBack" aria-label="Backspace">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                <line x1="18" y1="9" x2="12" y2="15"></line>
                <line x1="12" y1="9" x2="18" y2="15"></line>
              </svg>
            </button>
          </div>
        </section>

        <!-- Footer hint -->
        <footer class="calc-footer" role="contentinfo">
          <span class="keyboard-hint" aria-label="Keyboard shortcuts available">⌨ Keyboard supported</span>
        </footer>

      </div><!-- /.calculator -->
    </main>

    <!-- Keyboard shortcut toast -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="app.js"></script>
  </body>
</html>
