version: "3.9"

# ──────────────────────────────────────────────────────────────
# CalcPro – Local Development Stack
# Usage: docker compose up --build
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     calcpro_user
      POSTGRES_PASSWORD: calcpro_pass
      POSTGRES_DB:       calcpro_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcpro_user -d calcpro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV:    development
      SECRET_KEY:   dev-secret-change-me
      DATABASE_URL: postgresql://calcpro_user:calcpro_pass@db:5432/calcpro_db
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
    depends_on:
      db:
        condition: service_healthy
    # Override CMD for dev (hot-reload via Flask dev server)
    command: >
      python -m flask --app backend.app:create_app run
      --host 0.0.0.0 --port 5000 --debug

  # ── Nginx (serves frontend + proxies /api → backend) ───────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
    depends_on:
      - backend

volumes:
  pg_data:
